name: Deploy WfpChatBotWebAppDocker

on:
  push:
    branches:
      - master
    paths:
      - WfpChatBotWebApp/**
  workflow_dispatch:

concurrency:
  group: Deploy-WfpChatBotWebAppDocker
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: wfpacr-cxg6gvcqddd7bxcc.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: wfpacr-cxg6gvcqddd7bxcc.azurecr.io/wfpchatbotwebappdocker:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Azure login via OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (Container)
        uses: azure/webapps-deploy@v2
        with:
          app-name: "WfpWebAppDocker"
          images: wfpacr-cxg6gvcqddd7bxcc.azurecr.io/wfpchatbotwebappdocker:latest
